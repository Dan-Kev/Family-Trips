<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Семейные Кемпинги</title>

<style>
:root {
    --bg: #f5f5f5;
    --card: #ffffff;
    --text: #222;
    --accent: #2d6a4f;
}

@media (prefers-color-scheme: dark) {
    :root {
        --bg: #111;
        --card: #1b1b1b;
        --text: #f0f0f0;
    }
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Arial, sans-serif;
}

header {
    background: url("header.jpg") center/cover;
    min-height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
}

header h1 {
    display: none;
}

.title {
    text-align: center;
    font-size: 32px;
    font-weight: bold;
    padding: 20px 10px;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
    gap: 20px;
}

.card {
    background: var(--card);
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 3px 15px rgba(0,0,0,.15);
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-4px);
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.content {
    padding: 15px;
}

.meta {
    color: gray;
    font-size: 14px;
}

.button {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 16px;
    background: var(--accent);
    color: white;
    text-decoration: none;
    border-radius: 8px;
}

footer {
    text-align: center;
    padding: 30px;
    opacity: .7;
}
</style>
</head>

<body>

<header></header>

<div class="title">Семейные Кемпинги</div>

<div class="container">

<div class="grid">

<div class="card">
    <img src="cover1.jpg" alt="">
    <div class="content">
        <h2>Чаруши 2005</h2>
        <div class="meta">
            📅 Лето 2005<br>
            📍 Кировская область, Фаленский район, урочище Чаруши <br>
            📷 5 фото • 🎥 0 видео
        </div>
        <p>Семейный поход на тракторе</p>
        <a class="button" href="http://178.141.247.198:2283/share/5MaBZ2kcqu_fl0pMOha7duNs0ZgAlGs1LM_VMT4_srdzZMwnRyOkRn5eKLBzm6L82i0">
            Открыть альбом
        </a>
    </div>
</div>

<div class="card">
    <img src="cover2.jpg" alt="">
    <div class="content">
        <h2>Лесной лагерь</h2>
        <div class="meta">
            📅 Май 2026<br>
            📍 Лесное озеро<br>
            📷 185 фото • 🎥 7 видео
        </div>
        <p>Весенний выезд всей семьёй.</p>
        <a class="button" href="ССЫЛКА_НА_IMMICH">
            Открыть альбом
        </a>
    </div>
</div>

</div>

</div>

<footer>
    © DanKev💗
</footer>

</body>
</html>
